apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: exercise-ingress
  namespace: exercises
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /logs
        pathType: Prefix
        backend:
          service:
            name: log-output-svc
            port:
              number: 2345
      - path: /pingpong
        pathType: Prefix
        backend:
          service:
            name: ping-pong-app-svc
            port:
              number: 3456